
    <!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>

    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="container">

        <h1> To-Do List</h1>

        <button id="themeBtn">🌙 Dark Mode</button>

        <div class="input-area">

            <input type="text" id="taskInput" placeholder="Yeni görev ekle..." >

            <button id="addBtn">Ekle</button>

            <button id="clearAllBtn">🗑️ Tümünü Sil</button>
            
        </div>

        <div class="filter-area">

            <button id="allBtn">Hepsi</button>

            <button id="completedBtn">Tamamlananlar</button>

            <button id="activeBtn">Yapılacaklar</button>

            <select id="sortSelect">
                
               <option value="new">Yeni → Eski</option>

               <option value="old">Eski → Yeni</option>

               <option value="az">A → Z</option>

               <option value="za">Z → A</option>

            </select>
        </div>

        <ul id="taskList"></ul>

        <p id="taskCount">Toplam Görev: 0</p>

        <p id="completedCount">Tamamlanan: 0</p>

    </div>

    <script src="index.js"></script>

</body>
</html>
